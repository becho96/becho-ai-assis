services:
  # HTTP Server (Orchestrator API)
  http-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: becho-http-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HTTP_SERVER_PORT=3000
      - HTTP_SERVER_URL=http://http-server:3000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    networks:
      - becho-network
    command: npm run start:server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Telegram Bot
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: becho-telegram-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HTTP_SERVER_URL=http://http-server:3000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    networks:
      - becho-network
    depends_on:
      - http-server
    command: npm run start:bot

  # Redis (for caching and queues)
  redis:
    image: redis:7-alpine
    container_name: becho-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - becho-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  becho-network:
    driver: bridge

volumes:
  redis-data:
